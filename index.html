<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>huzzy b — Countdown</title>
    <!-- Подключаем официальный скрипт Telegram Web Apps -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100dvh;
            background-color: #000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Видео на весь экран */
        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
        }

        /* Темный оверлей */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
        }

        /* Основной контейнер */
        .container {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 40px 20px 60px 20px;
            text-align: center;
        }

        .header-zone {
            margin-top: 20px;
        }

        /* ТЕПЕРЬ HUZZY B СВЕРХУ */
        .artist {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        /* ТЕПЕРЬ "ДО ДРОПА ОСТАЛОСЬ" СНИЗУ */
        .title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #999;
            margin-top: 12px;
            font-weight: 500;
        }

        /* Таймер-плашка */
        .countdown {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            padding: 24px 20px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 340px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .time-number {
            font-size: 2.4rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .time-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #777;
            letter-spacing: 0.1em;
            margin-top: 8px;
            font-weight: 600;
        }

        .separator {
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.15);
            line-height: 1;
            padding-bottom: 14px;
        }

        .drop-message {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #ff3333;
            display: none;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.8; text-shadow: 0 0 10px rgba(255,51,51,0.4); }
            to { opacity: 1; text-shadow: 0 0 20px rgba(255,51,51,0.8); }
        }

        .footer-zone {
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <video autoplay loop playsinline webkit-playsinline id="bgVideo" class="video-bg">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="container">
        <div class="header-zone">
            <div class="artist">huzzy b</div>
            <div class="title">До дропа осталось</div>
        </div>

        <!-- Блок таймера -->
        <div id="timer" class="countdown">
            <div class="time-block">
                <span id="days" class="time-number">00</span>
                <span class="time-label">дн</span>
            </div>
            <div class="separator">:</div>
            <div class="time-block">
                <span id="hours" class="time-number">00</span>
                <span class="time-label">ч</span>
            </div>
            <div class="separator">:</div>
            <div class="time-block">
                <span id="minutes" class="time-number">00</span>
                <span class="time-label">мин</span>
            </div>
            <div class="separator">:</div>
            <div class="time-block">
                <span id="seconds" class="time-number">00</span>
                <span class="time-label">сек</span>
            </div>
        </div>

        <!-- Текст релиза -->
        <div id="release-text" class="drop-message">Трек в сети!</div>

        <div class="footer-zone">exclusive teaser</div>
    </div>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const video = document.getElementById('bgVideo');
        
        document.addEventListener("DOMContentLoaded", () => {
            video.play().catch(error => {
                video.muted = true;
                video.play();
                document.body.addEventListener('click', () => {
                    video.muted = false;
                }, { once: true });
            });
        });

        // УНИВЕРСАЛЬНЫЙ ОНЛАЙН-РАСЧЕТ ВРЕМЕНИ (12 Июня 2026, 00:00 МСК)
        // Месяцы в JS идут с 0, поэтому 5 — это Июнь. Вычитаем 3 часа, чтобы зафиксировать МСК (UTC+3)
        const targetDate = Date.UTC(2026, 5, 12, 0, 0, 0) - (3 * 60 * 60 * 1000);

        const timerElement = document.getElementById("timer");
        const releaseText = document.getElementById("release-text");

        const daysSpan = document.getElementById("days");
        const hoursSpan = document.getElementById("hours");
        const minutesSpan = document.getElementById("minutes");
        const secondsSpan = document.getElementById("seconds");

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                clearInterval(intervalId);
                timerElement.style.display = "none";
                releaseText.style.display = "block";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            daysSpan.textContent = days < 10 ? "0" + days : days;
            hoursSpan.textContent = hours < 10 ? "0" + hours : hours;
            minutesSpan.textContent = minutes < 10 ? "0" + minutes : minutes;
            secondsSpan.textContent = seconds < 10 ? "0" + seconds : seconds;
        }

        updateCountdown();
        const intervalId = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
